meta:
  registry_version: "0.4.1"
  esaa_version: "0.4.x"
  immutable_done: true

agents:
  agent-spec:
    display_name: "agent-spec"
    role: "specification"
  agent-impl:
    display_name: "agent-impl"
    role: "implementation"
  agent-qa:
    display_name: "agent-qa"
    role: "qa"
  agent-mock:
    display_name: "agent-mock"
    role: "deterministic-offline-fixture"

resolution:
  by_task_kind:
    spec:
      agent: "agent-spec"
      template: "spec.core"
    impl:
      agent: "agent-impl"
      template: "impl.core"
    qa:
      agent: "agent-qa"
      template: "qa.core"
  overrides:
    when_task_flag_is_hotfix:
      impl:
        agent: "agent-impl"
        template: "impl.hotfix"

templates:
  spec.core:
    task_kind: "spec"
    output_contract_hint: "Emit claim|complete|review|issue.report with strict JSON envelope."
  impl.core:
    task_kind: "impl"
    output_contract_hint: "complete requires verification.checks."
  impl.hotfix:
    task_kind: "impl"
    output_contract_hint: "complete requires issue_id + fixes + min 2 checks."
  qa.core:
    task_kind: "qa"
    output_contract_hint: "Review with approve/request_changes; report defects with evidence."

# G08/PROV-02: runners conhecidos (proveniencia). Runners nao sao agents:
# sao os principais/veiculos que emitem comandos vestindo papeis de agent.
runners:
  claude-cowork:
    display_name: "Claude (Cowork)"
    kind: "llm-agent"
  claude-code:
    display_name: "Claude Code (CLI)"
    kind: "llm-agent"
  codex:
    display_name: "Codex"
    kind: "llm-agent"
  human-terminal:
    display_name: "Operador humano via terminal"
    kind: "human"
  unattended:
    display_name: "Execucao nao atribuida"
    kind: "unknown"
